<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Learning Offline Bot</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #121212; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; padding: 10px; }
        .chat-container { width: 100%; max-width: 500px; height: 90vh; max-height: 700px; background: #1e1e1e; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: flex; flex-direction: column; overflow: hidden; }
        
        .chat-header { background: #bb86fc; color: #000; padding: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; font-weight: bold; font-size: 18px; position: relative; }
        
        .avatar-container { position: relative; width: 60px; height: 60px; background: #2d2d2d; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; border: 3px solid #000; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .avatar-container::after { content: ''; position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; background: #cf6679; border-radius: 50%; border: 2px solid #000; transition: 0.3s; }
        .avatar-container.ready::after { background: #4caf50; }
        
        .speaking { animation: bounceTalking 0.4s infinite alternate ease-in-out; border-color: #fff; }
        @keyframes bounceTalking {
            0% { transform: scale(1); box-shadow: 0 2px 8px rgba(187, 134, 252, 0.4); }
            100% { transform: scale(1.12); box-shadow: 0 4px 20px rgba(187, 134, 252, 0.8); }
        }

        .btn-header { position: absolute; padding: 5px 10px; font-size: 11px; background: rgba(0,0,0,0.2); border: 1px solid #000; border-radius: 4px; cursor: pointer; font-weight: bold; color: #000; }
        .btn-wipe { right: 15px; top: 15px; }
        .btn-test { left: 15px; top: 15px; background: rgba(255,255,255,0.2); }
        .btn-header:hover { background: #fff; color: #000; }

        .activation-banner { background: #332211; color: #ffb74d; padding: 10px; text-align: center; font-size: 13px; font-weight: bold; border-bottom: 1px solid #ffb74d; cursor: pointer; display: block; }

        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #121212; }
        .message { padding: 10px 15px; border-radius: 8px; max-width: 75%; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .message.user { background: #bb86fc; color: #000; align-self: flex-end; }
        .message.bot { background: #2d2d2d; color: #fff; align-self: flex-start; }
        .message.system { background: #222; color: #ffb74d; align-self: center; font-size: 12px; border: 1px dashed #ffb74d; padding: 5px 10px; border-radius: 4px; }
        
        .input-area { padding: 15px; display: flex; gap: 10px; border-top: 1px solid #333; background: #1e1e1e; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #333; background: #2d2d2d; color: #fff; border-radius: 8px; outline: none; }
        .btn-send { padding: 12px 20px; background: #bb86fc; color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-send:hover { background: #9a66da; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <button class="btn-header btn-test" onclick="testVoiceEngine()">Test Sound</button>
        <div class="avatar-container" id="avatar">👩‍💼</div>
        <div id="botName">Super Memory Voice Bot</div>
        <button class="btn-header btn-wipe" onclick="clearMemory()">Reset</button>
    </div>

    <div class="activation-banner" id="voiceBanner" onclick="unmuteVoiceEngine()">
        📣 Tap here to activate the Voice Engine before chatting!
    </div>

    <div class="chat-box" id="chatBox">
        <div class="message bot">Hello! Open this file using your mobile Google Chrome browser so my voice functions correctly!</div>
    </div>
    
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask or teach me..." autocomplete="off">
        <button class="btn-send" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    let learningMode = false;
    let pendingQuestion = "";
    let femaleVoice = null;
    let engineUnlocked = false;

    const defaultDatabase = {
        "hello": "Hello! I am ready to learn.",
        "hi": "Hey there!",
        "who are you": "I am your custom learning assistant. You can teach me answers permanently."
    };

    let botDatabase = JSON.parse(localStorage.getItem('offline_bot_brain')) || defaultDatabase;

    function loadVoices() {
        if (!('speechSynthesis' in window)) return;
        const voices = window.speechSynthesis.getVoices();
        
        // Find offline female voice profiles
        femaleVoice = voices.find(v => {
            const name = v.name.toLowerCase();
            return name.includes('female') || name.includes('zira') || 
                   name.includes('samantha') || name.includes('hazel') || 
                   name.includes('google us english') || name.includes('microsoft');
        });

        if (!femaleVoice) {
            femaleVoice = voices.find(v => v.lang.includes('en'));
        }
    }

    if ('speechSynthesis' in window) {
        window.speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();
    }

    function unmuteVoiceEngine() {
        engineUnlocked = true;
        loadVoices();
        
        document.getElementById("voiceBanner").style.display = "none";
        document.getElementById("avatar").classList.add("ready");
        
        botReply("Voice engine successfully activated.");
    }

    function testVoiceEngine() {
        if (!engineUnlocked) {
            unmuteVoiceEngine();
        } else {
            botReply("Testing audio channel. If you hear this, everything is working perfectly.");
        }
    }

    document.getElementById("userInput").focus();
    document.getElementById("userInput").addEventListener("keypress", function(e) {
        if (e.key === 'Enter') { sendMessage(); }
    });

    function sendMessage() {
        const inputField = document.getElementById("userInput");
        const messageText = inputField.value.trim();
        if (messageText === "") return;

        if(!engineUnlocked) { unmuteVoiceEngine(); }

        displayMessage(messageText, "user");
        inputField.value = "";

        setTimeout(() => {
            if (learningMode) {
                handleLearning(messageText);
            } else {
                handleQuery(messageText);
            }
        }, 500);
    }

    function handleQuery(text) {
        const cleanInput = cleanString(text);

        if (botDatabase[cleanInput]) {
            botReply(botDatabase[cleanInput]);
            return;
        }

        let matchedKey = null;
        for (let key in botDatabase) {
            if (cleanInput.includes(key) || key.includes(cleanInput)) {
                matchedKey = key;
                break;
            }
        }

        if (matchedKey) {
            botReply(botDatabase[matchedKey]);
        } else {
            learningMode = true;
            pendingQuestion = cleanInput;
            botReply(`I don't know that yet! What should my response be when you ask: "${text}"?`);
        }
    }

    function handleLearning(answerText) {
        botDatabase[pendingQuestion] = answerText;
        localStorage.setItem('offline_bot_brain', JSON.stringify(botDatabase));
        botReply(`Understood! Memory saved. Next time you ask something similar, I will say: "${answerText}"`);
        learningMode = false;
        pendingQuestion = "";
    }

    function botReply(text) {
        displayMessage(text, "bot");
        speakText(text);
    }

    function speakText(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            if (femaleVoice) utterance.voice = femaleVoice;
            
            utterance.pitch = 1.25; 
            utterance.rate = 1.0;  
            
            const avatar = document.getElementById("avatar");
            utterance.onstart = () => avatar.classList.add("speaking");
            utterance.onend = () => avatar.classList.remove("speaking");
            utterance.onerror = () => avatar.classList.remove("speaking");

            window.speechSynthesis.speak(utterance);
        } else {
            displayMessage("[System Error: Speech synthesis not supported by this browser view engine]", "system");
        }
    }

    function cleanString(str) {
        return str.toLowerCase().replace(/[?.!,/\\_+\-*()&^%$#@~`'":;]/g, "").trim();
    }

    function displayMessage(text, sender) {
        const chatBox = document.getElementById("chatBox");
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${sender}`;
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function clearMemory() {
        if (confirm("Are you sure you want to completely erase all learned phrases?")) {
            localStorage.removeItem('offline_bot_brain');
            botDatabase = { ...defaultDatabase };
            botReply("Memory cleared! Reverted back to original settings.");
        }
    }
</script>

</body>
</html>
